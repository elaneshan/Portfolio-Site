<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Hobbies - Elane Shane">
    <meta property="og:description" content="My Hobbies">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link lang='sass' rel="stylesheet" href="../static/styles/main.css">
    <link rel='icon' href='/static/img/favicon.ico' type='image/x-icon' />
    <title>Hobbies - Elane Shane</title>
</head>
<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="/static/img/logo.svg" />
                </div>
            </a>
            <nav class="nav-links">
            {% for label, url in nav_links %}
                <a href="{{ url }}">{{ label }}</a>
            {% endfor %}
        </nav>
        </div>
    </header>

    <div class="page-content">
        <h1>Hobbies</h1>

        {% for hobby in all_hobbies %}
            <section class="hobby">
                <h2>{{ hobby.name }}</h2>
                <p>{{ hobby.description }}</p>
                {% if hobby.name == "Specialty Matcha" %}
                <div class="carousel">
                    <div class="carousel-track">
                        {% for img in hobby.images %}
                            <img src="/static/img/{{ img }}" alt="Matcha">
                        {% endfor %}
                    </div>
                    <button class="carousel-btn prev" onclick="moveCarousel(-1)">&#8249;</button>
                    <button class="carousel-btn next" onclick="moveCarousel(1)">&#8250;</button>
                </div>
                {% elif hobby.image %}
                <div class="hobby-image">
                    <img src="/static/img/{{ hobby.image }}" alt="{{ hobby.name }}">
                </div>
                {% endif %}
            </section>
        {% endfor %}
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let current = 0;
            const images = document.querySelectorAll('.carousel-track img');

            function showImage(index) {
                images.forEach(img => img.style.display = 'none');
                if (images[index]) {
                    images[index].style.display = 'block';
                }
            }

            window.moveCarousel = function(direction) {
                current = (current + direction + images.length) % images.length;
                showImage(current);
            };

            showImage(current);
        });
    </script>
</body>
</html>
